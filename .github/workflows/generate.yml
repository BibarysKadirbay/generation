name: Generate Go Protos

on:
  push:
    branches: [main]
    paths:
      - "*.proto"
      - ".github/workflows/generate.yml"
jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout proto repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Setup protoc
        uses: arduino/setup-protoc@v3

      - name: Install plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate code
        run: |
          mkdir -p gen/go
          protoc \
            --proto_path=. \
            --go_out=gen/go \
            --go-grpc_out=gen/go \
            order.proto payment.proto

      - name: Checkout generated repo
        uses: actions/checkout@v4
        with:
          repository: BibarysKadirbay/generated-contracts
          token: ${{ secrets.GENERATED_CONTRACTS_TOKEN }}
          path: generated

      - name: Copy generated files
        run: |
          rm -rf generated/gen
          cp -R gen generated/

      - name: Commit & push
        run: |
          cd generated
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "update generated protos" || echo "no changes"
          git push